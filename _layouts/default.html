<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <!-- Theme: set before paint to prevent FOUC -->
  <script>
    (function(){
      var s=localStorage.getItem('cc-theme');
      var p=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      document.documentElement.dataset.theme=s||p;
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — Intelligence from the trenches{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="theme-color" content="#f5f2ee" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <!-- Google AdSense — async, non-blocking -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR_ADSENSE_ID" crossorigin="anonymous"></script> -->
  {% seo %}
</head>
<body>

{% include nav.html %}

{% include breadcrumb.html %}

{{ content }}

{% include footer.html %}

<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
